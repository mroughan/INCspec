<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="920" height="560" viewBox="0 0 920 560" version="1.1">
  <title>INC implementation flowchart</title>
  <desc>Language-neutral INC reader, writer, and schema validation workflow.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151"/>
    </marker>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; fill: #111827; }
      .title { font-size: 22px; font-weight: 700; }
      .lane { font-size: 15px; font-weight: 700; fill: #1f2937; }
      .box { fill: #ffffff; stroke: #374151; stroke-width: 1.5; rx: 6; ry: 6; }
      .decision { fill: #fef3c7; stroke: #92400e; stroke-width: 1.5; }
      .reader { fill: #e0f2fe; }
      .writer { fill: #dcfce7; }
      .schema { fill: #ede9fe; }
      .note { fill: #f9fafb; stroke: #9ca3af; stroke-width: 1.2; rx: 6; ry: 6; }
      .arrow { stroke: #374151; stroke-width: 1.6; fill: none; marker-end: url(#arrow); }
      .label { font-size: 12px; fill: #374151; }
      .small { font-size: 13px; }
    </style>
  </defs>

  <rect x="0" y="0" width="920" height="560" fill="#ffffff"/>
  <text x="40" y="42" class="title">INC Implementation Flow</text>

  <text x="40" y="86" class="lane">Reader</text>
  <rect x="40" y="105" width="150" height="54" class="box reader"/>
  <text x="115" y="128" text-anchor="middle" class="small">Read UTF-8</text>
  <text x="115" y="146" text-anchor="middle" class="small">text input</text>

  <polygon points="270,104 350,132 270,160 190,132" class="decision"/>
  <text x="270" y="128" text-anchor="middle" class="small">Opening</text>
  <text x="270" y="146" text-anchor="middle" class="small">delimiter?</text>

  <rect x="420" y="105" width="150" height="54" class="box reader"/>
  <text x="495" y="128" text-anchor="middle" class="small">Collect and parse</text>
  <text x="495" y="146" text-anchor="middle" class="small">metadata block</text>

  <rect x="640" y="105" width="150" height="54" class="box reader"/>
  <text x="715" y="128" text-anchor="middle" class="small">Apply structure</text>
  <text x="715" y="146" text-anchor="middle" class="small">and caller options</text>

  <rect x="420" y="200" width="150" height="54" class="box reader"/>
  <text x="495" y="223" text-anchor="middle" class="small">Plain CSV:</text>
  <text x="495" y="241" text-anchor="middle" class="small">empty metadata</text>

  <rect x="640" y="200" width="150" height="54" class="box reader"/>
  <text x="715" y="223" text-anchor="middle" class="small">Parse CSV</text>
  <text x="715" y="241" text-anchor="middle" class="small">component</text>

  <rect x="640" y="295" width="150" height="54" class="box reader"/>
  <text x="715" y="318" text-anchor="middle" class="small">Return metadata</text>
  <text x="715" y="336" text-anchor="middle" class="small">plus table</text>

  <path d="M 190 132 L 270 132" class="arrow"/>
  <path d="M 350 132 L 420 132" class="arrow"/>
  <text x="376" y="123" class="label">yes</text>
  <path d="M 270 160 L 270 227 L 420 227" class="arrow"/>
  <text x="286" y="190" class="label">no</text>
  <path d="M 570 132 L 640 132" class="arrow"/>
  <path d="M 715 159 L 715 200" class="arrow"/>
  <path d="M 570 227 L 640 227" class="arrow"/>
  <path d="M 715 254 L 715 295" class="arrow"/>

  <text x="40" y="395" class="lane">Writer</text>
  <rect x="40" y="415" width="150" height="54" class="box writer"/>
  <text x="115" y="438" text-anchor="middle" class="small">Validate</text>
  <text x="115" y="456" text-anchor="middle" class="small">metadata</text>

  <rect x="245" y="415" width="150" height="54" class="box writer"/>
  <text x="320" y="438" text-anchor="middle" class="small">Serialize sorted</text>
  <text x="320" y="456" text-anchor="middle" class="small">metadata block</text>

  <rect x="450" y="415" width="150" height="54" class="box writer"/>
  <text x="525" y="438" text-anchor="middle" class="small">Write CSV</text>
  <text x="525" y="456" text-anchor="middle" class="small">component</text>

  <path d="M 190 442 L 245 442" class="arrow"/>
  <path d="M 395 442 L 450 442" class="arrow"/>

  <text x="640" y="395" class="lane">Schema</text>
  <rect x="640" y="415" width="120" height="54" class="box schema"/>
  <text x="700" y="438" text-anchor="middle" class="small">Read schema</text>
  <text x="700" y="456" text-anchor="middle" class="small">INC file</text>

  <rect x="790" y="415" width="90" height="54" class="box schema"/>
  <text x="835" y="438" text-anchor="middle" class="small">Validate</text>
  <text x="835" y="456" text-anchor="middle" class="small">metadata</text>

  <path d="M 760 442 L 790 442" class="arrow"/>

  <rect x="40" y="500" width="840" height="36" class="note"/>
  <text x="460" y="523" text-anchor="middle" class="small">Reject malformed metadata, invalid structure keys/types, invalid schema paths, and unsafe writer values.</text>
</svg>
